<div class="wss-card">

  <!-- Header -->
  <div class="wss-head">
    <div class="wss-title-group">
      <div class="wss-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
        </svg>
      </div>
      <div>
        <div class="wss-title">Weekly Schedule</div>
        <div class="wss-sub">Sales sync · runs Monday</div>
      </div>
    </div>

    <span class="wss-badge"
          [class.badge-success]="status === 'success'"
          [class.badge-fail]="status === 'fail'"
          [class.badge-none]="status === 'none'">
      <span class="badge-dot"></span>
      {{ status === 'success' ? 'SUCCESS' : status === 'fail' ? 'FAILED' : 'NOT RUN' }}
    </span>
  </div>

  <!-- Rows -->
  <div class="wss-rows">

    <div class="wss-row">
      <span class="wss-lbl">Status</span>
      <span class="wss-val">
        <span class="status-ind"
              [class.ind-success]="status === 'success'"
              [class.ind-fail]="status === 'fail'"
              [class.ind-none]="status === 'none'">
          <span class="ind-dot"></span>
          {{ status === 'success' ? 'Success' : status === 'fail' ? 'Fail' : 'Not run yet' }}
        </span>
      </span>
    </div>

    <div class="wss-row">
      <span class="wss-lbl">Period Synced</span>
      <span class="wss-val mono">{{ periodLabel }}</span>
    </div>

    <div class="wss-row">
      <span class="wss-lbl">Next Schedule</span>
      <span class="wss-val mono">{{ nextMondayLabel }}</span>
    </div>

  </div>
</div>
